kind = "web"
previewPath = "/web/"
title = "TimeFlow Web - Student Planner"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/web/" ]
localPort = 22333

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web", "run", "build" ]
publicDir = "artifacts/web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22333"
BASE_PATH = "/web/"
